<!DOCTYPE html>
<html lang="ja">
<head>
   <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png"> <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>誘惑と鉄鎖 - Ver.33</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color:#050505; --card-bg:rgba(20,20,20,0.95); --neon-red:#ff1a1a; --accent-red:#8e0000; --accent-blue:#45aaf2; --accent-gold:#f1c40f; --accent-purple:#a55eea; --accent-orange:#e67e22; --text-color:#e0e0e0; }
        * { touch-action:manipulation; box-sizing:border-box; outline:none; }
        body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:radial-gradient(circle at center, #1a0505 0%, #050505 100%); font-family:'Noto Sans JP', sans-serif; color:var(--text-color); transition: background 1.5s ease; }
        body.citizen-win-bg { background: radial-gradient(circle at center, #0a1f3d 0%, #050505 100%); }
        .viewport { width:100%; height:100dvh; display:flex; justify-content:center; align-items:center; position:relative; overflow:hidden; }
        .screen { position:absolute; width:94%; max-width:440px; opacity:0; visibility:hidden; transform:translateY(15px); transition:0.3s ease; text-align:center; z-index:1; overflow-y: auto; max-height: 98dvh; padding: 10px; }
        .screen.active { opacity:1; visibility:visible; transform:translateY(0); z-index:10; }
        
        h1 { font-family:'Cinzel', serif; font-size:1.6rem; letter-spacing:4px; color:var(--neon-red); text-shadow:0 0 15px rgba(255, 26, 26, 0.6); margin: 0 0 10px; }
        .card { background:var(--card-bg); border:1px solid #301010; border-radius:20px; padding:15px; box-shadow: 0 0 30px rgba(0,0,0,1); position:relative; }

        .giant-selector { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0; }
        .btn-giant { width: 75px; height: 75px; border-radius: 50%; font-size: 2.2rem; background: #222; color: #fff; border: 3px solid var(--accent-gold); cursor: pointer; }
        .btn-giant:active { background: #444; }
        .display-giant { font-size: 4rem; font-family: 'Cinzel', serif; color: var(--accent-gold); min-width: 60px; text-shadow: 0 0 20px var(--accent-gold); }

        .role-step-container { margin: 12px 0; border-bottom: 1px solid #222; padding-bottom: 12px; }
        .role-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; margin-bottom: 5px; font-size: 1.1rem; }
        .stepper { display: flex; justify-content: center; align-items: center; gap: 35px; margin-top: 5px; }
        .btn-step { width: 60px; height: 60px; border-radius: 15px; border: 1px solid #666; background: #1a1a1a; color: #fff; font-size: 2rem; cursor: pointer; }
        .btn-step:active { background: #333; }
        .val-step { font-size: 2.5rem; font-family: 'Cinzel', serif; min-width: 50px; color: var(--accent-blue); }

        .villager-banner { background: rgba(255,255,255,0.08); border: 2px dashed #666; border-radius: 15px; padding: 15px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .v-label { font-size: 1.1rem; color: #fff; }
        .v-count { font-size: 2.5rem; font-family: 'Cinzel', serif; color: #fff; }

        input, textarea { width:100%; background:#111; border:1px solid #442222; color:white; padding:12px; margin-bottom:8px; border-radius:8px; font-size:16px; transition: 0.3s; }
        textarea[readonly] { background: #222; color: #888; border-color: #333; }
        
        button { width:100%; padding:14px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; margin-top:8px; transition:0.2s; font-size:1rem; }
        button:disabled { background:#222 !important; color:#555 !important; cursor:not-allowed; opacity:1; }
        .btn-primary { background:var(--accent-red); color:#fff; }
        .btn-outline { background:transparent; border: 1px solid #553333; color: #aaa; }
        .btn-flex { display:flex; gap:10px; } .btn-flex button { flex:1; }
        
        .color-人狼 { color: var(--neon-red) !important; text-shadow: 0 0 10px var(--neon-red); }
        .color-狂人 { color: var(--accent-orange) !important; text-shadow: 0 0 10px var(--accent-orange); }
        .color-占い師 { color: var(--accent-purple) !important; text-shadow: 0 0 10px var(--accent-purple); }
        .color-囚人 { color: var(--accent-blue) !important; text-shadow: 0 0 10px var(--accent-blue); }
        .color-富豪 { color: var(--accent-gold) !important; text-shadow: 0 0 10px var(--accent-gold); }
        .color-市民勝利 { color: var(--accent-gold) !important; text-shadow: 0 0 20px var(--accent-gold); font-size: 2.2rem; }
        #timer-display { font-size:4.5rem; font-family:'Cinzel', serif; margin:10px 0; color:#fff; }
        #status-bar { position:fixed; bottom:0; left:0; width:100%; background:rgba(0,0,0,0.9); font-size:11px; padding:5px; color:#666; text-align:center; z-index:999; }
    </style>
</head>
<body>

<div class="viewport">
    <!-- 1. ロビー画面 -->
    <div id="screen-lobby" class="screen active">
        <h1>誘惑と鉄鎖</h1>
        <div class="card">
            <div id="initial-setup">
                <input type="text" id="user-name" placeholder="プレイヤー名">
                <button class="btn-primary" id="host-init-btn" disabled onclick="initHost()">部屋を作る</button>
                <button class="btn-outline" onclick="startOfflineSetup()">対面でプレイ</button>
                <div style="margin:15px 0; border-top:1px solid #331111;"></div>
                <input type="text" id="room-id-input" placeholder="Room IDを入力">
                <button id="join-init-btn" class="btn-outline" disabled onclick="initGuest()">部屋に参加</button>
            </div>
            <div id="lobby-waiting" style="display:none;">
                <p id="display-id" style="color:var(--neon-red); font-weight:bold; font-size: 1.2rem;"></p>
                <div id="member-list" style="text-align:left; font-size:0.9rem; margin:15px 0; color:#ddd;"></div>
                <button id="host-go-to-config" class="btn-primary" style="display:none;" onclick="showRoleConfig()">役職設定へ進む</button>
                <p id="guest-waiting-msg" style="display:none; font-size:0.8rem; color:#888;">ホストが開始するのを待っています...</p>
            </div>
        </div>
    </div>

    <!-- 2. オフライン人数・名前設定 -->
    <div id="screen-offline-setup" class="screen">
        <h1>Player Count</h1>
        <div class="card" style="border: 2px solid var(--accent-gold);">
            <p>何人で儀式を行いますか？</p>
            <div class="giant-selector">
                <button class="btn-giant" onclick="adjustTotalPlayers(-1)">-</button>
                <div class="display-giant" id="giant-count-display">4</div>
                <button class="btn-giant" onclick="adjustTotalPlayers(1)">+</button>
            </div>
            <div id="off-name-container" style="max-height:150px; overflow-y:auto; margin-bottom:10px; border-top:1px solid #333; padding-top:10px;"></div>
            <button class="btn-primary" onclick="showRoleConfig()">次へ：役職設定</button>
        </div>
    </div>

    <!-- 3. 役職設定 (ホスト操作・ゲスト閲覧) -->
    <div id="screen-role-config" class="screen">
        <h1>Role Settings</h1>
        <div class="card">
            <div class="role-step-container">
                <div class="role-header"><span class="color-人狼">人狼</span></div>
                <div class="stepper"><button class="btn-step" onclick="changeRoleCount('ww', -1)">-</button><span class="val-step" id="val-ww">1</span><button class="btn-step" onclick="changeRoleCount('ww', 1)">+</button></div>
            </div>
            <div class="role-step-container">
                <div class="role-header"><span class="color-狂人">狂人</span></div>
                <div class="stepper"><button class="btn-step" onclick="changeRoleCount('mad', -1)">-</button><span class="val-step" id="val-mad">0</span><button class="btn-step" onclick="changeRoleCount('mad', 1)">+</button></div>
            </div>
            <div class="role-step-container">
                <div class="role-header"><span class="color-占い師">占い師</span></div>
                <div class="stepper"><button class="btn-step" onclick="changeRoleCount('seer', -1)">-</button><span class="val-step" id="val-seer">1</span><button class="btn-step" onclick="changeRoleCount('seer', 1)">+</button></div>
            </div>
            <div class="role-step-container">
                <div class="role-header"><span class="color-囚人">囚人</span></div>
                <div class="stepper"><button class="btn-step" onclick="changeRoleCount('prisoner', -1)">-</button><span class="val-step" id="val-prisoner">1</span><button class="btn-step" onclick="changeRoleCount('prisoner', 1)">+</button></div>
            </div>
            <div class="role-step-container">
                <div class="role-header"><span class="color-富豪">富豪</span></div>
                <div class="stepper"><button class="btn-step" onclick="changeRoleCount('billionaire', -1)">-</button><span class="val-step" id="val-billionaire">1</span><button class="btn-step" onclick="changeRoleCount('billionaire', 1)">+</button></div>
            </div>
            <div class="villager-banner">
                <span class="v-label">村人 (残り)</span><div class="v-count" id="display-villager-count">0</div>
            </div>
            
            <p style="font-size:0.8rem; color:#888; text-align:left; margin: 15px 0 5px;">囚人の枷リスト</p>
            <textarea id="global-shackles" rows="2" placeholder="囚人の枷（改行区切り）" oninput="syncConfig()">相手に3回以上反論する
特定のワードを5回言う</textarea>
            
            <button class="btn-primary" id="final-start-btn" onclick="validateAndStart()">役職確認に進む</button>
            <p id="guest-config-wait-msg" style="display:none; font-size:0.8rem; color:var(--accent-gold); margin-top:15px; font-weight:bold;">ホストが設定を編集中です...</p>
        </div>
    </div>

    <!-- 4. 進行：受け渡し -->
    <div id="screen-handover" class="screen">
        <h1 id="handover-phase-title"></h1>
        <div class="card">
            <h2 id="handover-name" style="font-size:2.5rem; color:var(--accent-blue);"></h2>
            <p style="font-size: 1.1rem; margin: 15px 0;">さんにスマホを回してください。</p>
            <button id="handover-btn" class="btn-primary" style="margin-top:20px; padding: 20px;" onclick="handoverComplete()">行動を始める</button>
        </div>
    </div>

    <!-- 5. 進行：本人確認 -->
    <div id="screen-confirm" class="screen">
        <div class="card">
            <h2 id="confirm-name"></h2>
            <div class="btn-flex" style="margin-top:20px;">
                <button class="btn-primary" style="padding: 20px;" onclick="showRole()">はい、私です</button>
                <button id="confirm-no-btn" class="btn-outline" onclick="alert('本人に渡してください')">いいえ</button>
            </div>
        </div>
    </div>

    <!-- 6. 進行：役職表示 -->
    <div id="screen-reveal" class="screen">
        <div class="card">
            <h1 id="my-role-name"></h1><div id="my-role-icon" style="font-size:5rem;"></div>
            <div id="reveal-info-box" style="margin-top:10px; font-size:1.2rem; border-top:1px solid #333; padding-top:15px; font-weight:bold;"></div>
            
            <div id="ww-choice" style="display:none; margin-top:20px;">
                <p>誘導ターゲットを選択せよ</p>
                <div class="btn-flex"><button id="target-A" class="btn-outline" onclick="selectTarget('A')">A</button><button id="target-B" class="btn-outline" onclick="selectTarget('B')">B</button></div>
            </div>
            <button id="reveal-done-btn" class="btn-primary" style="margin-top:30px;" onclick="playerReady()">確認完了</button>
            <p id="ready-wait-msg" style="display:none; color:#888; font-size:0.8rem; margin-top:20px;">他の者の準備を待っています...</p>
        </div>
    </div>

    <!-- 7. 議論 -->
    <div id="screen-discussion" class="screen">
        <h1>DISCUSSION</h1>
        <div class="card">
            <div id="timer-display">05:00</div>
            <div class="btn-flex"><button class="btn-outline" onclick="adjustTime(60)">+1:00</button><button class="btn-outline" onclick="adjustTime(-60)">-1:00</button></div>
            <div id="special-info" style="display:none; margin:10px 0; padding:12px; border:1px dashed #442222; border-radius:10px; font-size:0.9rem;"></div>
            
            <div id="host-controls" style="display:none; margin-top:20px;">
                <button id="timer-btn" class="btn-primary" onclick="toggleTimer()">一時停止</button>
                <button class="btn-outline" onclick="hostGoToVote()">投票へ進む</button>
            </div>
            <div id="off-controls" style="display:none; margin-top:20px;">
                <button class="btn-primary" onclick="hostGoToVote()">議論終了（投票へ）</button>
            </div>
        </div>
    </div>

    <!-- 8. 投票 -->
    <div id="screen-vote" class="screen">
        <h1 id="vote-player-label">VOTING</h1>
        <div class="card">
            <div id="shackle-confirm-step" style="display:none; padding:15px; background:rgba(69, 170, 242, 0.1); border:1px solid var(--accent-blue); border-radius:12px; margin-bottom:15px;">
                <p style="color:var(--accent-blue); font-weight:bold; margin-bottom:10px;">「枷」は達成できましたか？</p>
                <div class="btn-flex">
                    <button id="shackle-yes" class="btn-outline" onclick="setShackleStatus(true)">はい</button>
                    <button id="shackle-no" class="btn-outline" onclick="setShackleStatus(false)">いいえ</button>
                </div>
            </div>
            <div id="vote-action-area">
                <div class="btn-flex"><button id="vbtn-A" class="btn-outline" onclick="preSubmitVote('A')">A</button><button id="vbtn-B" class="btn-outline" onclick="preSubmitVote('B')">B</button></div>
                <button id="vbtn-confirm" class="btn-primary" style="display:none; margin-top:15px;" onclick="finalSubmitVote()">この回答で決定する</button>
            </div>
            <p id="vote-status-text" style="margin-top:20px; font-size:0.9rem; color:#888;"></p>
            <p id="opening-msg" style="display:none; color:var(--accent-gold); font-weight:bold;">開票中...</p>
        </div>
    </div>

    <!-- 9. 結果 -->
    <div id="screen-result" class="screen">
        <h1 id="result-winner" style="font-size: 2.2rem;"></h1>
        <div class="card" id="final-card">
            <div class="shine-effect"></div>
            <div id="result-text" style="font-size:1.2rem;"></div>
            <div id="shackle-msg" style="font-weight:bold; margin:10px 0;"></div>
            <hr style="border:0.5px solid #331111; margin:15px 0;">
            <div id="result-roles" style="text-align:left; font-size:0.9rem; line-height:1.8;"></div>
            <button class="btn-primary" id="reset-btn" onclick="hostBackToSetup()">次の儀式へ</button>
        </div>
    </div>
</div>

<div id="status-bar">準備中...</div>

<script>
    let peer=null, conn=null, connections=[], isOnline=false, isHost=false, totalPlayers = 4;
    let roleCounts = { ww: 1, mad: 0, seer: 1, prisoner: 1, billionaire: 1 };
    let myId="", myName="", players=[], lastRoleMap={};
    let myRoleData={}, wwTarget="", readyCount=0, votes={}, timerInt=null, timeLeft=300;
    let shackleAchieved = true, shackleConfirmed = true, offlineRound = 1, offlineStep = 0, offlineVoteStep = 0, tempVoteChoice = "";
    let tempTarget = ""; 
    let wwTargetList = []; 

    const icons = { "人狼":"😈", "狂人":"🤡", "占い師":"🔮", "囚人":"⛓️", "富豪":"👑", "村人":"👨‍🌾" };

    window.onload = () => { loadSettings(); peer = new Peer(); peer.on('open', id => { myId=id; log("準備完了"); document.getElementById('host-init-btn').disabled=false; document.getElementById('join-init-btn').disabled=false; }); };

    function log(m){ document.getElementById('status-bar').innerText = m; }
    function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); const target = document.getElementById(id); if(target) { target.classList.add('active'); if(id==='screen-role-config') updateVillagerCount(); } }

    function loadSettings() {
        document.getElementById('user-name').value = localStorage.getItem('cc_u') || "";
        document.getElementById('global-shackles').value = localStorage.getItem('cc_sOn') || "相手に3回以上反論する\n特定のワードを5回言う\n語尾に「にゃん」を付ける";
        updateOfflineNameInputs();
    }

    // --- 人数設定 ---
    function adjustTotalPlayers(v) {
        totalPlayers = Math.max(3, Math.min(10, totalPlayers + v));
        document.getElementById('giant-count-display').innerText = totalPlayers;
        updateOfflineNameInputs();
        updateVillagerCount();
    }
    
    function updateOfflineNameInputs() {
        const container = document.getElementById('off-name-container'); container.innerHTML = "";
        for(let i=1; i<=totalPlayers; i++) { let saved = localStorage.getItem('cc_o'+i) || "プレイヤー"+i; container.innerHTML += `<input type="text" id="off-p${i}" value="${saved}" oninput="localStorage.setItem('cc_o${i}', this.value)">`; }
    }

    // --- 役職・設定同期 ---
    function changeRoleCount(key, v) {
        roleCounts[key] = Math.max(0, roleCounts[key] + v);
        if(key === 'ww' && roleCounts[key] < 1) roleCounts[key] = 1;
        document.getElementById('val-'+key).innerText = roleCounts[key];
        updateVillagerCount();
    }

    function updateVillagerCount() {
        let max = isOnline ? (players.length || 1) : totalPlayers;
        let setRoles = Object.values(roleCounts).reduce((a,b)=>a+b, 0);
        let villagers = max - setRoles;
        const vDisplay = document.getElementById('display-villager-count');
        const startBtn = document.getElementById('final-start-btn');
        
        if(villagers < 0 && (!isOnline || isHost)) {
            vDisplay.innerText = villagers;
            vDisplay.style.color = "var(--neon-red)";
            startBtn.disabled = true;
            startBtn.innerText = "役職数が多すぎます";
        } else {
            vDisplay.innerText = villagers;
            vDisplay.style.color = "#fff";
            startBtn.disabled = false;
            startBtn.innerText = "役職確認に進む";
        }
        
        if(isOnline && isHost) syncConfig();
    }

    function syncConfig() {
        if(!isHost || !isOnline) return;
        broadcast({
            type: 'config-sync',
            roleCounts: roleCounts,
            shackles: document.getElementById('global-shackles').value,
            villagers: document.getElementById('display-villager-count').innerText
        });
    }

    function showRoleConfig() { 
        if(isOnline && isHost) broadcast({type:'show-config'}); 
        show('screen-role-config'); 

        // ゲスト用UI制御
        if(isOnline && !isHost) {
            document.querySelectorAll('.btn-step').forEach(b => b.style.display = 'none');
            document.getElementById('global-shackles').readOnly = true;
            document.getElementById('final-start-btn').style.display = 'none';
            document.getElementById('guest-config-wait-msg').style.display = 'block';
        } else {
            document.querySelectorAll('.btn-step').forEach(b => b.style.display = 'inline-block');
            document.getElementById('global-shackles').readOnly = false;
            document.getElementById('final-start-btn').style.display = 'block';
            document.getElementById('guest-config-wait-msg').style.display = 'none';
        }
        if(isOnline && isHost) syncConfig();
    }

    function startOfflineSetup() { isOnline = false; isHost = true; updateOfflineNameInputs(); show('screen-offline-setup'); }
    function initHost(){ myName = document.getElementById('user-name').value; if(!myName) return alert("名前を入力してください"); localStorage.setItem('cc_u', myName); isOnline = true; isHost = true; players = [{id:myId, name:myName}]; document.getElementById('initial-setup').style.display='none'; document.getElementById('lobby-waiting').style.display='block'; document.getElementById('display-id').innerText="ROOM ID: " + myId; updateLobbyUI(); peer.on('connection', c=>{ connections.push(c); c.on('data', d=>handleData(d, c)); }); }
    function initGuest(){ myName = document.getElementById('user-name').value; let rid = document.getElementById('room-id-input').value.trim(); if(!myName || !rid) return alert("名前とIDを入力してください"); localStorage.setItem('cc_u', myName); isOnline = true; isHost = false; conn = peer.connect(rid, {reliable:true}); conn.on('open', ()=>{ conn.send({type:'join', name:myName}); document.getElementById('initial-setup').style.display='none'; document.getElementById('lobby-waiting').style.display='block'; document.getElementById('display-id').innerText="ID: " + rid; }); conn.on('data', d=>handleData(d, null)); }
    function updateLobbyUI(){ document.getElementById('member-list').innerHTML=players.map(p=>"・"+p.name).join("<br>"); if(isHost){ document.getElementById('host-go-to-config').style.display = (players.length>=2) ? 'block' : 'none'; broadcast({type:'lobby', players}); } }
    function broadcast(d){ connections.forEach(c=>c.send(d)); }

    function handleData(d, c){
        if(d.type==='join' && isHost){ players.push({id:c.peer, name:d.name}); updateLobbyUI(); }
        if(d.type==='lobby'){ players=d.players; updateLobbyUI(); show('screen-lobby'); }
        if(d.type==='show-config'){ showRoleConfig(); }
        if(d.type==='config-sync'){
            roleCounts = d.roleCounts;
            document.getElementById('val-ww').innerText = roleCounts.ww;
            document.getElementById('val-mad').innerText = roleCounts.mad;
            document.getElementById('val-seer').innerText = roleCounts.seer;
            document.getElementById('val-prisoner').innerText = roleCounts.prisoner;
            document.getElementById('val-billionaire').innerText = roleCounts.billionaire;
            document.getElementById('global-shackles').value = d.shackles;
            const vDisplay = document.getElementById('display-villager-count');
            vDisplay.innerText = d.villagers;
            vDisplay.style.color = (parseInt(d.villagers) < 0) ? "var(--neon-red)" : "#fff";
        }
        if(d.type==='start-reveal'){ 
            lastRoleMap = d.roleMap; myRoleData = d.roleMap[myId]; wwTarget = ""; tempTarget = ""; wwTargetList = []; readyCount=0; votes={}; timeLeft=300; 
            document.body.classList.remove('citizen-win-bg'); show('screen-confirm'); document.getElementById('confirm-name').innerText = myName; 
        }
        if(d.type==='ww-choice' && isHost){ wwTargetList.push(d.target); }
        if(d.type==='player-ready' && isHost){ readyCount++; checkAllReady(); }
        if(d.type==='start-discussion'){ wwTarget=d.target; startDiscussion(); }
        if(d.type==='sync-time'){ timeLeft=d.time; updateTimerDisp(); if(d.active && !timerInt) startTimerLocal(); else if(!d.active && timerInt){clearInterval(timerInt); timerInt=null;} }
        if(d.type==='go-to-vote') { triggerVoteScreen(); }
        if(d.type==='submit-vote' && isHost){ votes[c.peer]={choice:d.choice, achieved:d.achieved}; updateOnlineVoteStatus(); }
        if(d.type==='final-result') displayResult(d);
        if(d.type==='back-to-setup') show('screen-lobby');
    }

    function validateAndStart() {
        try {
            if(!isOnline) { 
                players = []; 
                for(let i=1; i<=totalPlayers; i++) { let el = document.getElementById('off-p'+i); players.push({id:'p'+i, name: el ? el.value : "プレイヤー"+i}); }
            }
            hostStartGame();
        } catch (error) { alert("エラーが発生しました。やり直してください。"); console.error(error); }
    }

    function hostStartGame(){
        wwTarget = ""; tempTarget = ""; wwTargetList = []; readyCount = 0; votes = {};
        let rolePool = [];
        for(let i=0; i<roleCounts.ww; i++) rolePool.push("人狼");
        for(let i=0; i<roleCounts.mad; i++) rolePool.push("狂人");
        for(let i=0; i<roleCounts.seer; i++) rolePool.push("占い師");
        for(let i=0; i<roleCounts.prisoner; i++) rolePool.push("囚人");
        for(let i=0; i<roleCounts.billionaire; i++) rolePool.push("富豪");
        while(rolePool.length < players.length) rolePool.push("村人");
        rolePool.sort(()=>Math.random()-0.5);

        let shacksText = document.getElementById('global-shackles').value; localStorage.setItem('cc_sOn', shacksText);
        let shacks = shacksText.split('\n').filter(s=>s.trim());
        let kase = shacks.length > 0 ? shacks[Math.floor(Math.random()*shacks.length)] : "なし";

        let roleMap={}; players.forEach((p,i)=>{ let r=rolePool[i] || "村人"; roleMap[p.id]={role:r, shackle:r==="囚人"?kase:"", votes:r==="富豪"?2:1}; });
        
        // 仲間の人狼表示用
        let wwNames = players.filter(p => roleMap[p.id].role === '人狼').map(p => p.name);
        players.forEach(p => { if(roleMap[p.id].role === '人狼') roleMap[p.id].partners = wwNames.filter(n => n !== p.name); });
        lastRoleMap = roleMap;

        if(isOnline) { 
            broadcast({type:'start-reveal', roleMap}); myRoleData = roleMap[myId]; document.body.classList.remove('citizen-win-bg');
            show('screen-confirm'); document.getElementById('confirm-name').innerText = myName; 
        } else { 
            offlineRound = 1; offlineStep = 0; triggerHandover(players[0].name, prepareOfflineIdentity, "夜の行動を始める", "1周目：役職確認"); 
        }
    }

    let handoverNextFunc = null;
    function triggerHandover(playerName, nextFunc, btnText, phaseLabel) { document.getElementById('handover-phase-title').innerText = phaseLabel || ""; document.getElementById('handover-name').innerText = playerName; document.getElementById('handover-btn').innerText = btnText; handoverNextFunc = nextFunc; show('screen-handover'); }
    function handoverComplete() { if(handoverNextFunc) handoverNextFunc(); }
    function prepareOfflineIdentity() { myRoleData = lastRoleMap[players[offlineStep].id]; document.getElementById('confirm-name').innerText = players[offlineStep].name + " さん"; show('screen-confirm'); }
    
    function showRole(){
        show('screen-reveal');
        document.getElementById('my-role-name').innerText = myRoleData.role;
        document.getElementById('my-role-icon').innerText = icons[myRoleData.role] || "";
        document.getElementById('my-role-name').className = "color-" + myRoleData.role;
        let info = document.getElementById('reveal-info-box');
        info.innerHTML = "";
        
        document.getElementById('ww-choice').style.display = 'none';
        document.getElementById('reveal-done-btn').style.display = 'block';
        tempTarget = "";
        document.getElementById('target-A').className = 'btn-outline';
        document.getElementById('target-B').className = 'btn-outline';

        let partnerText = "";
        if (myRoleData.role === '人狼') {
            if (myRoleData.partners && myRoleData.partners.length > 0) partnerText = "<br><span style='font-size:0.9rem; color:#ff7675;'>仲間: " + myRoleData.partners.join('、') + "</span>";
            else partnerText = "<br><span style='font-size:0.9rem; color:#888;'>仲間の人狼はいません</span>";
        }

        if(!isOnline) {
            if(offlineRound === 1) {
                if(myRoleData.role === '人狼') { 
                    info.innerHTML = "ターゲットを選択してください。" + partnerText + "<br><small style='font-size:0.75rem; color:#888;'>※複数いる場合はランダム決定。</small>"; 
                    document.getElementById('ww-choice').style.display = 'block';
                    document.getElementById('reveal-done-btn').style.display = 'none';
                } else { info.innerHTML = "今は役職を確認してください。"; }
            } else {
                if(myRoleData.role === "囚人") info.innerHTML = "あなたの枷: <br><b class='color-囚人'>" + myRoleData.shackle + "</b>";
                else if(myRoleData.role === "占い師") info.innerHTML = "人狼のターゲットは: <br><b class='color-人狼'>" + wwTarget + "</b>";
                else if(myRoleData.role === "人狼" || myRoleData.role === "狂人") info.innerHTML = "最終ターゲット: <br><b class='color-人狼'>" + wwTarget + "</b>" + partnerText;
                else info.innerHTML = "人狼の誘導を阻止してください。";
            }
        } else {
            if(myRoleData.role === "囚人") info.innerHTML = "あなたの枷: <br><b class='color-囚人'>" + myRoleData.shackle + "</b>";
            if(myRoleData.role === '人狼') {
                info.innerHTML = "ターゲットを選択してください。" + partnerText + "<br><small style='font-size:0.75rem; color:#888;'>※複数いる場合はランダム決定。</small>"; 
                document.getElementById('ww-choice').style.display = 'block';
                document.getElementById('reveal-done-btn').style.display = 'none';
            }
        }
    }

    function selectTarget(t){ tempTarget = t; document.getElementById('target-A').className = t==='A' ? 'btn-primary' : 'btn-outline'; document.getElementById('target-B').className = t==='B' ? 'btn-primary' : 'btn-outline'; document.getElementById('reveal-done-btn').style.display = 'block'; }
    
    function playerReady(){
        if(isOnline){ 
            document.getElementById('reveal-done-btn').style.display='none'; document.getElementById('ready-wait-msg').style.display='block';
            if(isHost){ 
                if(myRoleData.role==='人狼' && tempTarget) wwTargetList.push(tempTarget);
                readyCount++; checkAllReady(); 
            } else { 
                if(myRoleData.role==='人狼' && tempTarget) conn.send({type:'ww-choice', target:tempTarget}); 
                conn.send({type:'player-ready'}); 
            } 
        } else { 
            if(myRoleData.role==='人狼' && tempTarget) wwTargetList.push(tempTarget);
            offlineStep++; 
            if(offlineStep < players.length){ triggerHandover(players[offlineStep].name, prepareOfflineIdentity, "次へ", (offlineRound === 1 ? "1周目：役職確認" : "2周目：詳細確認")); }
            else { 
                if(offlineRound === 1) { 
                    if(wwTargetList.length > 0) wwTarget = wwTargetList[Math.floor(Math.random() * wwTargetList.length)];
                    else wwTarget = Math.random() < 0.5 ? 'A' : 'B';
                    offlineRound = 2; offlineStep = 0; triggerHandover(players[0].name, prepareOfflineIdentity, "詳細確認へ", "2周目：詳細確認"); 
                } 
                else { startDiscussion(); } 
            } 
        }
    }

    function checkAllReady(){ 
        if(readyCount===players.length){ 
            if(wwTargetList.length > 0) wwTarget = wwTargetList[Math.floor(Math.random() * wwTargetList.length)];
            else wwTarget = Math.random() < 0.5 ? 'A' : 'B';
            broadcast({type:'start-discussion', target:wwTarget}); startDiscussion(); 
        }
    }
    
    function startDiscussion(){ 
        show('screen-discussion'); 
        let info = document.getElementById('special-info');
        info.style.display = "none"; 
        if(isOnline) {
            if(myRoleData.role==='占い師' || myRoleData.role==='囚人' || myRoleData.role==='狂人' || myRoleData.role==='人狼'){
                info.style.display = "block";
                if(myRoleData.role==='占い師') info.innerHTML="人狼のターゲット: <b class='color-占い師'>"+wwTarget+"</b>";
                else if(myRoleData.role==='囚人') info.innerHTML="枷: <b class='color-囚人'>"+myRoleData.shackle+"</b>";
                else if(myRoleData.role==='狂人' || myRoleData.role==='人狼') {
                    let pText = myRoleData.partners && myRoleData.partners.length > 0 ? ("<br><span style='font-size:0.8rem; color:#ff7675;'>仲間: " + myRoleData.partners.join('、') + "</span>") : "";
                    info.innerHTML="決定ターゲット: <b class='color-人狼'>"+wwTarget+"</b>" + pText;
                }
            }
        }
        if(isOnline && isHost){ document.getElementById('host-controls').style.display='block'; if(!timerInt) toggleTimer(); } 
        else if(!isOnline) { document.getElementById('off-controls').style.display='block'; if(!timerInt) startTimerLocal(); } 
    }
    
    function startTimerLocal(){ timerInt=setInterval(()=>{if(timeLeft>0){timeLeft--;updateTimerDisp();}},1000); }
    function toggleTimer(){ if(timerInt){clearInterval(timerInt);timerInt=null;document.getElementById('timer-btn').innerText="再開";}else{startTimerLocal();document.getElementById('timer-btn').innerText="一時停止";} if(isHost)broadcast({type:'sync-time', time:timeLeft, active:!!timerInt}); }
    function updateTimerDisp(){ let m=Math.floor(timeLeft/60).toString().padStart(2,'0'), s=(timeLeft%60).toString().padStart(2,'0'); document.getElementById('timer-display').innerText=m+":"+s; }
    function adjustTime(v){ timeLeft=Math.max(0,timeLeft+v); updateTimerDisp(); if(isOnline && isHost)broadcast({type:'sync-time', time:timeLeft, active:!!timerInt}); }

    function hostGoToVote(){ if(timerInt){clearInterval(timerInt);timerInt=null;} if(isOnline) { broadcast({type:'go-to-vote'}); triggerVoteScreen(); } else { offlineVoteStep = 0; triggerOfflineVoteLoop(); } }

    function triggerVoteScreen() { 
        show('screen-vote'); tempVoteChoice = ""; 
        const isP = (myRoleData.role === '囚人'); 
        document.getElementById('shackle-confirm-step').style.display = isP ? 'block' : 'none'; 
        document.getElementById('vbtn-A').disabled = isP; document.getElementById('vbtn-B').disabled = isP; 
        document.getElementById('vbtn-A').className = "btn-outline"; document.getElementById('vbtn-B').className = "btn-outline"; 
        document.getElementById('vbtn-confirm').style.display = 'none'; 
        shackleConfirmed = !isP; 
    }

    function setShackleStatus(a) { shackleAchieved = a; shackleConfirmed = true; document.getElementById('shackle-yes').className = a ? "btn-yes active" : "btn-outline"; document.getElementById('shackle-no').className = !a ? "btn-no active" : "btn-outline"; document.getElementById('vbtn-A').disabled = false; document.getElementById('vbtn-B').disabled = false; }
    function preSubmitVote(choice) { tempVoteChoice = choice; document.getElementById('vbtn-A').className = (choice === 'A') ? 'btn-primary' : 'btn-outline'; document.getElementById('vbtn-B').className = (choice === 'B') ? 'btn-primary' : 'btn-outline'; document.getElementById('vbtn-confirm').style.display = 'block'; }
    function finalSubmitVote() { 
        if(isOnline){ 
            document.getElementById('vote-action-area').style.display='none'; 
            if(isHost){ votes[myId] = { choice: tempVoteChoice, achieved: shackleAchieved }; updateOnlineVoteStatus(); } 
            else { conn.send({type:'submit-vote', choice: tempVoteChoice, achieved: shackleAchieved}); document.getElementById('vote-status-text').innerText = "集計中..."; } 
        } else { 
            votes[players[offlineVoteStep].id] = { choice: tempVoteChoice, achieved: shackleAchieved }; 
            offlineVoteStep++; 
            if(offlineVoteStep < players.length) triggerOfflineVoteLoop(); 
            else { show('screen-vote'); document.getElementById('vote-action-area').style.display = 'none'; document.getElementById('opening-msg').style.display = 'block'; setTimeout(calcResult, 2000); } 
        } 
    }

    function updateOnlineVoteStatus() { let c = Object.keys(votes).length; document.getElementById('vote-status-text').innerText = "状況: " + c + "/" + players.length; if(c === players.length) { document.getElementById('opening-msg').style.display = 'block'; setTimeout(calcResult, 2000); } }
    
    function triggerOfflineVoteLoop() { triggerHandover(players[offlineVoteStep].name, prepareOfflineVote, "投票を始める", "最終投票"); }
    function prepareOfflineVote() { let p = players[offlineVoteStep]; myRoleData = lastRoleMap[p.id]; document.getElementById('confirm-name').innerText = p.name + " さん"; show('screen-confirm'); document.querySelector('#screen-confirm .btn-primary').onclick = () => { triggerVoteScreen(); document.getElementById('vote-player-label').innerText = p.name + " の投票"; }; }

    function calcResult(){ 
        let sA=0, sB=0, sS=true; 
        players.forEach(p=>{ 
            let v=votes[p.id], r=lastRoleMap[p.id]; 
            if(v.choice==='A') sA += r.votes; else sB += r.votes; 
            if(r.role==='囚人' && !v.achieved) sS = false; 
        }); 
        let fA = sA >= sB ? 'A' : 'B', w = (fA === wwTarget) || !sS; 
        let rd = {finalAns:fA, scoreA:sA, scoreB:sB, wwTarget, werewolfWins:w, sSuccess:sS, votes, players, roleMap:lastRoleMap}; 
        if(isOnline) broadcast({type:'final-result', ...rd}); displayResult(rd); 
    }

    function displayResult(d){ 
        show('screen-result'); 
        let wl=document.getElementById('result-winner'), card=document.getElementById('final-card'), rb=document.getElementById('reset-btn'); 
        if(d.werewolfWins){ wl.innerText="人狼陣営の勝利"; wl.className="color-人狼"; rb.style.background="var(--accent-red)"; } 
        else { wl.innerText="市民陣営の勝利"; wl.className="color-市民勝利"; document.body.classList.add('citizen-win-bg'); card.classList.add('citizen-win-card'); rb.style.background="var(--accent-gold)"; } 
        document.getElementById('shackle-msg').innerText = d.sSuccess ? "【枷】完遂！" : "【枷】未達成により敗北"; 
        document.getElementById('shackle-msg').style.color = d.sSuccess ? "var(--accent-blue)" : "var(--accent-red)"; 
        document.getElementById('result-text').innerHTML="回答: <b>"+d.finalAns+"</b> (A:"+d.scoreA+" / B:"+d.scoreB+")<br>人狼の狙い: <b>"+d.wwTarget+"</b>"; 
        document.getElementById('result-roles').innerHTML=d.players.map(p=>`<div>${p.name}: <span class='color-${d.roleMap[p.id].role}'>${d.roleMap[p.id].role}</span> (${d.votes[p.id].choice})</div>`).join(""); 
        rb.style.display = isHost ? "block" : "none"; 
        document.querySelector('#screen-confirm .btn-primary').onclick = showRole; // リセット
    }

    function hostBackToSetup(){ 
        if(isOnline) { broadcast({type:'back-to-setup'}); show('screen-lobby'); } else { show('screen-offline-setup'); } 
    }
</script>
</body>
</html>
